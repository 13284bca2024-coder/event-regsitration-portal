<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:20px;
        }
        h1{
            text-align:center;
        }
        nav{
            text-align:center;
            margin-bottom:20px;
            font-size:18px;
        }
        nav a{
            text-decoration:none;
            color:#007bff;
            font-weight:bold;
            margin:0 10px;
        }
        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }
        th,td{
            border:1px solid #ccc;
            padding:10px;
            text-align:center;
        }
        th{
            background:#007bff;
            color:white;
        }
        button{
            padding:6px 12px;
            background:red;
            color:white;
            border:none;
            cursor:pointer;
            border-radius:4px;
        }
    </style>
</head>
<body>

<nav>
    <a href="student.html">Student</a> |
    <a href="coordinator.html">Coordinator</a> |
    <a href="admin.html">Admin</a>
</nav>
<hr>

<h1>Admin Dashboard</h1>
<table>
    <thead>
        <tr>
            <th>Event Name</th>
            <th>Date</th>
            <th>Venue</th>
            <th>Eligibility</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="eventTable"></tbody>
</table>

<script>

let events = JSON.parse(localStorage.getItem("events")) || [];

displayEvents();

function displayEvents(){

    let data="";

    events.forEach((event,index)=>{

        data += `
        <tr>
            <td>${event.name}</td>
            <td>${event.date}</td>
            <td>${event.venue}</td>
            <td>${event.eligibility}</td>

            <td>
            <button onclick="deleteEvent(${index})">
            Delete
            </button>
            </td>
        </tr>
        `;

    });

    document.getElementById("eventTable").innerHTML=data;
}

function deleteEvent(index){

    events.splice(index,1);

    localStorage.setItem("events",JSON.stringify(events));

    displayEvents();

}

</script>
</body>
</html>
