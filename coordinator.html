<!DOCTYPE html>
<html>
<head>
<title>Event Coordinator</title>
<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    margin:20px;
}
nav{
    text-align:center;
    margin-bottom:20px;
    font-size:18px;
}
nav a{
    text-decoration:none;
    color:#007bff;
    font-weight:bold;
    margin:0 10px;
}
.container{
    width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}
input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}
</style>
</head>
<body>

<nav>
    <a href="student.html">Student</a> |
    <a href="coordinator.html">Coordinator</a> |
    <a href="admin.html">Admin</a>
</nav>
<hr>

<div class="container">
<h2>Event Coordinator</h2>
<input type="text" id="eventName" placeholder="Event Name">
<input type="date" id="eventDate">
<input type="text" id="venue" placeholder="Venue">
<input type="text" id="eligibility" placeholder="Eligibility">
<input type="url" id="googleForm" placeholder="Google Form Link">
<textarea id="description" placeholder="Event Description"></textarea>
<button onclick="addEvent()">Publish Event</button>
</div>

<script>

function addEvent(){

let event={
name:document.getElementById("eventName").value,
date:document.getElementById("eventDate").value,
venue:document.getElementById("venue").value,
eligibility:document.getElementById("eligibility").value,
link:document.getElementById("googleForm").value,
description:document.getElementById("description").value
};

let events=JSON.parse(localStorage.getItem("events")) || [];

events.push(event);

localStorage.setItem("events",JSON.stringify(events));

alert("Event Published Successfully!");

location.reload();

}

</script>
</body>
</html>
